<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Firebase 연결 테스트</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #4f46e5; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #4338ca; }
        #result { margin-top: 20px; font-weight: bold; }
        .success { color: #059669; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📡 Firebase 연결 테스트</h1>
        <p>아래 버튼을 눌러 데이터베이스 읽기/쓰기를 테스트합니다.</p>
        <button onclick="testConnection()">연결 테스트 시작</button>
        <div id="result">결과가 여기에 표시됩니다.</div>
    </div>

    <script>
        // 사용자님의 실제 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyCLcvn0LL6I1pWnJ54Pi5Z3mHMzkerd_TM",
            authDomain: "school-supplies-rental-system.firebaseapp.com",
            projectId: "school-supplies-rental-system",
            storageBucket: "school-supplies-rental-system.firebasestorage.app",
            messagingSenderId: "212323277172",
            appId: "1:212323277172:web:6828275c6779c54f2cb421"
        };

        // 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "⏳ 테스트 중...";
            resultDiv.className = "";

            try {
                // 1. 쓰기 테스트
                const testDoc = db.collection("test_connection").doc("status");
                await testDoc.set({
                    message: "연결 성공!",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // 2. 읽기 테스트
                const doc = await testDoc.get();
                if (doc.exists) {
                    resultDiv.innerHTML = "✅ Firebase 연결 성공! 데이터베이스가 정상 작동합니다.";
                    resultDiv.className = "success";
                } else {
                    throw new Error("데이터를 썼지만 읽어오지 못했습니다.");
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "❌ 연결 실패: " + error.message;
                resultDiv.className = "error";
                
                if (error.message.includes("permission-denied")) {
                    resultDiv.innerHTML += "<br><small>(원인: Firestore Rules 설정에서 allow read, write: if true; 로 되어 있는지 확인하세요!)</small>";
                }
            }
        }
    </script>
</body>
</html>
